name: Build and Release ProMed
on: [push]

permissions:
  contents: write  # This allows GitHub to create the release for you

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          docker run --rm -v "$(pwd)":/home/user/hostcwd \
          kivy/buildozer android debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: v1.0.${{ github.run_number }}
          name: ProMed App Update ${{ github.run_number }}
          body: |
            Direct APK Download link below. 
            No zip extraction needed.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
